- name: setup mongodb configuartion
  hosts: mongodb
  become: yes
  tasks:
    - name: Installing required packages
      package:
        name:
          - gpg
          - unzip
        state: present
        update_cache: yes

    - name: Downloading gpg key for mongodb repo
      get_url:
      url: https://pgp.mongodb.com/server-7.0.asc
      dest: /tmp/mongodb.asc
    
    - name: convert gpg key to keyring format
      command: gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor /tmp/mongodb.asc

    - name: copy mongodb repo from local to destination
      copy:
        src: ./mongodb.list
        dest: /etc/apt/sources.list.d/mongodb-org-7.0.list

    - name: Install cache
      package:
        update_cache: yes

    - name: Install mongodb
      package:
        name: mongodb-org
        state: present

    - name: enable and start the service
      service:
        name: mongod
        state: started
        enabled: yes
      
    - name: Allowing remote connections
      replace:
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'

    - name: restarted the service
      service:
        name: mongod
        state: restarted