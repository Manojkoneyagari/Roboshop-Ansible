- name: setup shipping configuartion
  hosts: shipping
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Maven
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - maven
        - python3-pymysql
        - unzip

    - name: create roboshop system user
      ansible.builtin.user:
        name: roboshop
        home: /app
        shell: /sbin/nologin
        system: true
        comment: roboshop system user


    - name: removing directory if it exists
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Remove a zip file if it exists
      ansible.builtin.file:
        path: /tmp/catalogue.zip
        state: absent

    - name: Creating directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Downloading code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
        dest: /tmp/shipping.zip

    - name: unzip the file
      unarchive:
        src: /tmp/shipping.zip
        dest: /app
        remote_src: yes

    - name: install dependencies
      command: mvn clean package
      args:
          chdir: /app

    - name: move shipping jar
      command: mv target/shipping-1.0.jar shipping.jar 
      args:
        chdir: /app

    - name: copy shipping service
      template:
        src: shipping.service.j2
        dest: /etc/systemd/system/shipping.service

    - name: enable and start shipping
      service:
        name: shipping
        state: started
        enabled: yes

    - name: Install mysql client
      apt:
        name: mysql-client
        state: present

    - name: Load schema.sql
      community.mysql.mysql_db:
        login_host: mysql.manojkoney.store
        login_user: root
        login_password: "Manoj@123"
        name: all
        state: import
        target: "{{ item }}"
      loop:
        - /app/db/schema.sql
        - /app/db/app-user.sql 
        - /app/db/master-data.sql
    
    - name: deamon reload
      systemd:
        name: shipping
        daemon_reload: true

    - name: enable and start shipping
      service:
        name: shipping
        state: restarted
        enabled: yes

          

