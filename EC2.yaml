- name: Automating EC2 creation using ansible
  hosts: local
  connection: local
  vars:
    instances: ["mongodb", "mysql", "rabbitmq", "redis", "catalogue", "shipping", "cart", "user", "payment", "frontend"]
    AMI: ami-05cf1e9f73fbad2e2
    ZONE_ID: Z07186583IUMEVUQL0IYT
    RECORDNAME: "manojkoney.store"
    action: "create"
  tasks:
    - name: printing instances
      debug:
        var: instances
      



    - name: creating EC2 instances
      amazon.aws.ec2_instance:  
        name: "{{ item }}-roboshop"
        key_name: "Key.pem"
        instance_type: t3.micro
        region: us-east-1
        image_id: "{{ AMI }}"
        security_groups:
        - "{{ item }}-roboshop"
        - common-roboshop
      register: ec2_output
      loop: "{{ instances }}"
      when: action == "create"


    - name: printing instance name and ipaddress
      debug:
        msg: "instance_name: {{ item.item }} and ipaddress: {{ item.instances[0].private_ip_address }}"
      loop: "{{ ec2_output.results }}"



  #create route 53 records
    - name: creating route53 record
      amazon.aws.route53:
        state: present
        zone: "{{ ZONE_ID }}"
        record: "{{ item.item }}.{{ RECORDNAME }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
        loop: "{{ ec2_output.results }}"
      when: action == "create" && instances != "frontend"



    - name: creating route53 record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ ZONE_ID }}"
        record: "{{ RECORDNAME }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
        loop: "{{ ec2_output.results }}"
      when:   
        - action == "create"
        - instances == "frontend"



#Deleting route 53 records
    - name: creating route53 record
      amazon.aws.route53:
        state: absent
        zone: "{{ ZONE_ID }}"
        record: "{{ item.item }}.{{ RECORDNAME }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
        loop: "{{ ec2_output.results }}"
      when: action == "create" && instances != "frontend"



    - name: creating route53 record for frontend
      amazon.aws.route53:
        state: absent
        zone: "{{ ZONE_ID }}"
        record: "{{ RECORDNAME }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
        loop: "{{ ec2_output.results }}"
      when:   
        - action == "create"
        - instances == "frontend"

    
#Deleting EC2 instances
    - name: Delete the EC2 instance
      amazon.aws.ec2_instance:
        state: terminated
        name: "{{ item }}-roboshop"
        wait: false
        
      loop: "{{ instances }}"
      when: action == "delete"

      

  