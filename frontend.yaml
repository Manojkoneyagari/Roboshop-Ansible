- name: setup frontend configuartion
  hosts: frontend
  become: yes
  tasks:
    - name: Installing required packages
      package:
        name:
          - gpg
          - unzip
        state: present
        update_cache: yes

    - name: Downloading gpg key for mongodb repo
      get_url:
        url: https://nginx.org/keys/nginx_signing.key
        dest: /tmp/nginx.key
    
    - name: convert gpg key to keyring format
      command: 
        cmd: gpg -o /usr/share/keyrings/nginx-archive-keyring.gpg --dearmor /tmp/nginx.key
        creates: /usr/share/keyrings/nginx-archive-keyring.gpg
