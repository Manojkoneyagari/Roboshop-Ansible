- name: setup catalogue configuartion
  hosts: catalogue
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - curl
          - ca-certificates
          - gnupg
        state: present

    - name: Download NodeSource setup script
      get_url:
        url: https://deb.nodesource.com/setup_20.x
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Run NodeSource setup script
      shell: bash /tmp/nodesource_setup.sh
      args:
        executable: /bin/bash

    - name: Install nodejs
      apt:
        name: nodejs
        state: present

    - name: Nodejs version
      command: node -v
      register: node_output

    - name: Show nodejs version
      debug:
        var: node_output

    - name: create roboshop system user
      ansible.builtin.user:
        name: roboshop
        home: /app
        shell: /sbin/nologin
        system: true
        comment: roboshop system user

    - name: removing directory if it exists
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Remove a zip file if it exists
      ansible.builtin.file:
        path: /tmp/catalogue.zip
        state: absent

    - name: Creating directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Downloading code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: unzip the file
      unarchive:
        src: /tmp/catalogue.zip
        dest: /app

    - name: Install Node.js dependencies from app direc
      community.general.npm:
        path: /app
        state: present

    - name: copy catalogue service
      template:
        src: catalogue.service.j2
        dest: /etc/systemd/system/catalogue.service

    - name: Downloading gpg key for mongodb repo
      get_url:
        url: https://pgp.mongodb.com/server-7.0.asc
        dest: /tmp/mongodb.asc
    
    - name: convert gpg key to keyring format
      command: gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor /tmp/mongodb.asc

    - name: copy mongodb repo from local to destination
      copy:
        src: ./mongodb.list
        dest: /etc/apt/sources.list.d/mongodb-org-7.0.list

    - name: Install cache
      apt:
        update_cache: yes

    - name: Install mongodb client
      package:
        name: mongodb-mongosh
        state: present

    - name: check catalogue schema exist ot not
      shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output
      tags:
      - mongodb
    - name: print catalogue_output
      debug: 
        msg: "{{ catalogue_output }}"
      tags:
      - mongodb
    - name: load products
      shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
      when: catalogue_output.stdout | int < 0
      tags:
      - mongodb

    - name: deamon reload
      systemd:
        name: catalogue
        daemon_reload: true

    - name: enable and start catalogue
      service:
        name: catalogue
        state: restarted
        enabled: yes